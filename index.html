    <svg aria-hidden="true" style="position: absolute; width: 0; height: 0; overflow: hidden;" version="1.1"

        <defs>
            <symbol id="icon-select-object" viewBox="0 0 52 52">
                <path stroke="#d4d4d4" stroke-width="2.5" fill="none"
                    d="M 12 18 L 26 11 L 40 18 L 40 35 L 26 43 L 12 35 L 12 18 M 12 18 L 26 26 L 40 18 M 26 26 L 26 43" />
                    <path stroke="#ffffff" stroke-width="3.5" fill="none"

                    " />
            </symbol>
            <symbol id="icon-select-point" viewBox="0 0 52 52">
                <path stroke="#d4d4d4" stroke-width="2.5" fill="none"
                    d="M 12 18 L 26 11 L 40 18 L 40 35 L 26 43 L 12 35 L 12 18" />
                <circle cx="26" cy="26" r="3.5" fill="#fff" stroke="none" />
            </symbol>
            <symbol id="icon-select-edge" viewBox="0 0 52 52">
                <path stroke="#d4d4d4" stroke-width="2.5" fill="none"
                    d="M 21 40 L 12 35 L 12 18 L 26 11 L 40 18 L 40 35 L 31 40" />
                <rect x="24" y="23" width="4" height="21" fill="#fff" stroke="none" />
            </symbol>
            <symbol id="icon-select-face" viewBox="0 0 52 52">
                <path stroke="#d4d4d4" stroke-width="2.5" fill="none" d="M 23 41 L 12 35 L 12 18 L 26 11 L 35 15" />
                <path stroke="none" fill="#ffffff" d="M 26 24 L 40 17 L 40 36 L 26 44" />
            </symbol>
        </defs>
    </svg>
    <div style="
        width: 100vw;
        height: 100vh;
        ">
        <div class="menubar">
            <div>File</div>
            <div>Edit</div>
            <div>Render</div>
            <div>Window</div>
            <div>Help</div>
        </div>
        <style>
            .toolbar {
                box-sizing: border-box;
                padding: 3px;
                height: 32px;
            }

            .toolbar>div {
                box-sizing: border-box;
                background-color: #545454;
                border: 1px solid #3d3d3d;
                /* border: 1px solid #f00; */
                box-shadow: 1px 1px 1px #2d2d2d;
                padding: 1px;
                height: 28px;
                width: 28px;
                align-content: center;
            }

            .tool-icon {
                display: block;
                margin: auto;
                color: #fff;
                width: 24px;
                height: 24px;
            }
        </style>
        <div class="toolbar">
            <div title="Object Selection Mode"
                style="border-top-left-radius: 4px; border-bottom-left-radius: 4px; border-right: none;">
                <svg class="tool-icon">
                    <use xlink:href="#icon-select-object" />
                </svg>
            </div>
            <div title="Point Selection Mode" style="border-right: none;">
                <svg class="tool-icon">
                    <use xlink:href="#icon-select-point" />
                </svg>
            </div>
            <div title="Edge Selection Mode" style="border-right: none; background-color: #4771b3;">
                <svg class="tool-icon">
                    <use xlink:href="#icon-select-edge" />
                </svg>
            </div>
            <div title="Face Selection Mode" style="border-top-right-radius: 4px; border-bottom-right-radius: 4px;">
                <svg class="tool-icon">
                    <use xlink:href="#icon-select-face" />
                </svg>
            </div>
        </div>
        <canvas class="canvas"></canvas>
        <div class="panel">
            Transform<br />
            Location:<br />
            <div class="X">X 0m</div>
            <div class="Y">Y 0m</div>
            <div class="Z">Z 0m</div>
            Rotation<br />
            <div class="X">X 0°</div>
            <div class="Y">Y 0°</div>
            <div class="Z">Z 0°</div>
            XZY Euler<br />
            Scale<br />
            <div class="X">X 1.000</div>
            <div class="Y">Y 1.000</div>
            <div class="Z">Z 1.000</div>
            Dimensions<br />
            <div class="X">X 2 m</div>
            <div class="Y">Y 2 m</div>
            <div class="Z">Z 2 m</div>
        </div>
        <div class="status">Select Rotate View Options</div>
