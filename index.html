<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>m13-gpu</title>

    <link rel="stylesheet" href="font/inter/inter.css">
    <style>
        /* https://github.com/rsms/inter */
        /* @font-face {
            font-family: 'InterDisplay';
            font-style: normal;
            src: url(font/Inter-Light.woff2)
        } */
        /* @font-face {
            font-family: 'SFPro';
            font-style: normal;
            src: url(font/SF-Pro-Text-Thin.otf)
        } */

        :root {
            color-scheme: light dark;

            font-size: 100%;
            text-size-adjust: none;
            -webkit-text-size-adjust: none;

            --tx-font-family: 'IBM Plex Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --tx-font-size: calc((12/16) * 1rem);
            --tx-font-size-info: calc((11/16) * 1rem);

            /* font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; */
            font-family: Tahoma;
            font-size: calc((12/16) * 1rem);
            font-weight: 100;
            letter-spacing: 0.02rem;
        }

        /* @supports (font-variation-settings: normal) {
            :root {
                font-family: 'Inter var', sans-serif;
            }
        } */

        html,
        body {
            margin: 0;
        }

        body {
            overflow: hidden;
        }

        .menubar {
            display: flex;
            background-color: #191919;
            height: 28px;
        }

        .menubar>div {
            height: 22px;
            background-color: #181818;
            /* background-color: #202020; */
            /* background-color: #303030; */
            border: #202020 1px solid;
            border-radius: 4px;
            padding: 6px 9px 0px 9px;
        }

        .toolbar {
            display: flex;
            background-color: #363636;
            box-sizing: border-box;
            padding: 2px;
            height: 32px;
        }

        .toolbar>div {
            display: flex;
            padding-left: 3px;
            padding-right: 3px;
        }

        .toolbar>div>div {
            box-sizing: border-box;
            background-color: #545454;
            border: 1px solid #3d3d3d;
            box-shadow: 1px 1px 1px #2d2d2d;
            padding: 1px;
            height: 28px;
            width: 28px;
            border-right: none;
        }

        .toolbar>div>div:first-child {
            border-top-left-radius: 4px;
            border-bottom-left-radius: 4px;
            border-right: none;
        }

        .toolbar>div>div:last-child {
            border-top-right-radius: 4px;
            border-bottom-right-radius: 4px;
        }

        .toolbar>div>div.tx-active {
            background-color: #4771b3;
        }

        .tool-icon {
            /* display: block;
                margin: auto; */
            color: #fff;
            width: 24px;
            height: 24px;
        }

        .gl-input {
            display: flex;
            flex-flow: row nowrap;
            align-items: stretch;
            justify-content: space-between;
            background-color: #545454;
            /* padding: 4px; */
            padding-left: 15px;
            padding-right: 14px;
            margin: 1px;
            cursor: col-resize;
        }

        .gl-input>* {
            padding-top: 4px;
            padding-bottom: 4px;
        }

        .gl-input>input {
            border: none;
        }

        .gl-input:hover {
            background: #797979;
        }

        .panel {
            background-color: #3e3e3e;
            border: #4a4a4a solid 1px;
            border-radius: 4px;
            width: 250px;
            padding: 8px;
        }

        .X,
        .Y,
        .Z {
            background-color: #545454;
            padding: 4px;
            padding-left: 15px;
            margin: 1px;
        }

        .X {
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
        }

        .Z {
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
        }

        .canvas {
            border-radius: 4px;
        }

        .status {
            background-color: #181818;
            color: #ccc;
            height: 16px;
            padding: 4px;
            padding-left: 18px;
        }
    </style>
</head>

<body>
    <script type="module" src="src/main.tsx"></script>
</body>

</html>
